# Base configs for one-off smoke runs.
# study.ini is auto-generated by study/generate.py and contains the 20,000 study configs.

include study.ini

[General]
cmdenv-express-mode = true

**.maxTransmissionDuration = 4s
**.energyDetection = -110dBm
**.*Nic*.energySourceModule = ""
**.*Nic*.radio.energyConsumer.typename = ""
**.radio.radioMediumModule = "LoRaMedium"
**.LoRaMedium.pathLoss.typename = "FreeSpacePathLoss"
**.nodes[*].**.initFromDisplayString = false
**.nodes[*].**.evaluateADRinNode = false


[Config Flood]
network = flood.FloodMesh
sim-time-limit = 600s

**.nodes[*].app[0].initialLoRaSF = 11
**.nodes[*].app[0].initialLoRaBW = 250kHz
**.nodes[*].app[0].initialLoRaCR = 5
**.nodes[*].app[0].initialLoRaCF = 868MHz
**.nodes[*].app[0].initialLoRaTP = 22dBm

**.nodes[*].mobility.initialX = uniform(0m, 5000m)
**.nodes[*].mobility.initialY = uniform(0m, 5000m)

**.numNodes = 8
**.nodes[*].numApps = 1
**.nodes[*].app[0].typename = "flood.FloodApp"

**.nodes[0].app[0].isSource = true
**.nodes[*].app[0].isSource = false
**.nodes[*].app[0].sendInterval = 30s
**.nodes[*].app[0].initialHopLimit = 3
**.nodes[*].app[0].payloadSizeBytes = 32B

**.nodes[*].app[0].cwMin = 2
**.nodes[*].app[0].cwMax = 8
**.nodes[*].app[0].slotTime = 100ms
**.nodes[*].app[0].snrGoodDb = -5
**.nodes[*].app[0].snrBadDb = -15


[Config Slora]
network = sim.SloraMesh
sim-time-limit = 30s

**.numNodes = 3
**.nodes[*].mobility.initialX = uniform(0m, 150m)
**.nodes[*].mobility.initialY = uniform(0m, 150m)

**.nodes[*].app.broadcastFreqHz = 902.25MHz
**.nodes[*].app.broadcastBwHz   = 500kHz
**.nodes[*].app.broadcastSF     = 7
**.nodes[*].app.broadcastTxPowerDbm = 14dBm
**.nodes[*].app.broadcastCR     = 5


[Config SloraEcho]
extends = Slora
sim-time-limit = 120s

**.nodes[*].app.trafficEnabled = true
**.nodes[*].app.trafficInterval = 10s


[Config SloraChain]
extends = Slora
sim-time-limit = 600s

**.numNodes = 11
**.nodes[*].mobility.initialY = 500m
**.nodes[0].mobility.initialX  = 0m
**.nodes[1].mobility.initialX  = 200m
**.nodes[2].mobility.initialX  = 400m
**.nodes[3].mobility.initialX  = 600m
**.nodes[4].mobility.initialX  = 800m
**.nodes[5].mobility.initialX  = 1000m
**.nodes[6].mobility.initialX  = 1200m
**.nodes[7].mobility.initialX  = 1400m
**.nodes[8].mobility.initialX  = 1600m
**.nodes[9].mobility.initialX  = 1800m
**.nodes[10].mobility.initialX = 2000m


# 3x3 grid at 400m spacing, single source at centre, 5-hop limit.
# Useful for spot-checking each Flood variant in isolation.
[Config FloodMPRSmoke]
network = flood.FloodMesh
sim-time-limit = 60s

**.numNodes = 9
**.nodes[0].mobility.initialX = 0m
**.nodes[0].mobility.initialY = 0m
**.nodes[1].mobility.initialX = 400m
**.nodes[1].mobility.initialY = 0m
**.nodes[2].mobility.initialX = 800m
**.nodes[2].mobility.initialY = 0m
**.nodes[3].mobility.initialX = 0m
**.nodes[3].mobility.initialY = 400m
**.nodes[4].mobility.initialX = 400m
**.nodes[4].mobility.initialY = 400m
**.nodes[5].mobility.initialX = 800m
**.nodes[5].mobility.initialY = 400m
**.nodes[6].mobility.initialX = 0m
**.nodes[6].mobility.initialY = 800m
**.nodes[7].mobility.initialX = 400m
**.nodes[7].mobility.initialY = 800m
**.nodes[8].mobility.initialX = 800m
**.nodes[8].mobility.initialY = 800m

**.nodes[*].numApps = 1
**.nodes[*].app[0].typename = "flood.FloodApp"
**.nodes[*].app[0].mode = "mpr"

**.nodes[*].app[0].initialLoRaSF = 7
**.nodes[*].app[0].initialLoRaBW = 500kHz
**.nodes[*].app[0].initialLoRaCR = 5
**.nodes[*].app[0].initialLoRaCF = 902.25MHz
**.nodes[*].app[0].initialLoRaTP = -30dBm

**.nodes[4].app[0].isSource = true
**.nodes[*].app[0].isSource = false
**.nodes[*].app[0].sendInterval = 1s
**.nodes[*].app[0].initialHopLimit = 5
**.nodes[*].app[0].trafficDestOffset = 4
**.nodes[*].app[0].payloadSizeBytes = 32B

**.nodes[*].app[0].cwMin = 2
**.nodes[*].app[0].cwMax = 8
**.nodes[*].app[0].slotTime = 100ms
**.nodes[*].app[0].snrGoodDb = -5
**.nodes[*].app[0].snrBadDb = -15

**.nodes[*].app[0].helloInterval = 5s
**.nodes[*].app[0].helloJitter = 1s
**.nodes[*].app[0].neighbourTimeout = 30s


[Config FloodSNRSmoke]
extends = FloodMPRSmoke
**.nodes[*].app[0].mode = "snr"


[Config FloodNaiveSmoke]
extends = FloodMPRSmoke
**.nodes[*].app[0].mode = "naive"
